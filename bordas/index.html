<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Meu Site</h1>

        <nav>
            <ul>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#listas">Listas</a></li>
                <li><a href="#formulario">Formulário</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section id="sobre">
            <h2>Sobre HTML e CSS</h2>
            <p>HTML estrutura o conteúdo e <em>CSS</em> estiliza.</p>
            <p>O navegador interpreta e renderiza a página.</p>
        </section>

        <section id="listas">
            <h2>Listas</h2>

            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
            </ul>

            <ol>
                <li>Primeiro</li>
                <li>Segundo</li>
            </ol>
        </section>

        <section id="formulario">
            <h2>Formulário</h2>

            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome">

                <label for="email">Email:</label>
                <input type="email" id="email">

                <button type="submit">Enviar</button>
            </form>
        </section>

    </main>

    <footer>
        <p>© 2026 - SENAC</p>
    </footer>

</body>
</html>
